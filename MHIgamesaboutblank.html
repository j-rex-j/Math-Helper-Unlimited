<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Helper Games</title>
  <style>
    /* ── Inline font stack that looks like Orbitron/Exo 2 without CDN ── */
    @import url('data:text/css,');

    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    :root {
      --bg-color: #020510; --text-color: #e0e8ff; --accent-color: #00d4ff;
      --glow-color: #7b2fff; --glass-bg: rgba(10, 20, 50, 0.35);
      --glass-border: rgba(120, 200, 255, 0.18);
      --glass-shadow: 0 8px 32px rgba(0, 180, 255, 0.1), 0 2px 8px rgba(0,0,0,0.5);
      /* Fallback font stacks matching Orbitron/Exo 2 character */
      --font-display: 'Orbitron', 'Rajdhani', 'Audiowide', 'Courier New', monospace;
      --font-body: 'Exo 2', 'Rajdhani', 'Segoe UI', Tahoma, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg-color);
      font-family: var(--font-display);
      color: #e8f7ff;
    }
    .nebula-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(123,47,255,0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 75%, rgba(0,212,255,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0,30,80,0.8) 0%, #020510 70%);
    }
    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 5% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 48% 35%, rgba(200,220,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 73% 55%, rgba(200,220,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 88%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 63% 48%, rgba(255,255,255,0.3) 0%, transparent 100%);
    }

    /* ── SPLASH ── */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; opacity: 1; transition: opacity 0.8s ease-out 3s;
    }
    #splash-screen.hidden { opacity: 0; pointer-events: none; }
    .splash-wrapper {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 0; gap: 0;
    }
    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px; animation: gridPulse 4s ease-in-out infinite;
    }
    @keyframes gridPulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }
    .math-symbol {
      position: absolute; font-family: var(--font-body); color: var(--accent-color);
      opacity: 0; animation: floatSymbol 8s ease-in-out infinite; pointer-events: none; font-size: 1.5rem;
    }
    @keyframes floatSymbol {
      0%{opacity:0;transform:translateY(40px) rotate(0deg)}
      20%{opacity:0.18} 80%{opacity:0.18}
      100%{opacity:0;transform:translateY(-200px) rotate(360deg)}
    }
    .title-line { overflow: hidden; position: relative; }
    .title-main {
      font-family: var(--font-display); font-weight: 900;
      font-size: clamp(1.8rem,5vw,3.5rem);
      color: var(--text-color); letter-spacing: 0.08em; text-transform: uppercase;
      opacity: 0; transform: translateY(100%);
      animation: slideReveal 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
      text-shadow: 0 0 20px rgba(0,212,255,0.4), 0 0 60px rgba(123,47,255,0.2); margin: 0;
    }
    .title-sub {
      font-family: var(--font-display); font-weight: 400;
      font-size: clamp(1.2rem,3.5vw,2.5rem);
      color: var(--accent-color); letter-spacing: 0.35em; text-transform: uppercase;
      opacity: 0; transform: translateY(100%);
      animation: slideReveal 1s cubic-bezier(0.16,1,0.3,1) 1s forwards;
      text-shadow: 0 0 30px rgba(0,212,255,0.6), 0 0 80px rgba(0,212,255,0.3); margin: 0;
    }
    @keyframes slideReveal { 0%{opacity:0;transform:translateY(100%)} 100%{opacity:1;transform:translateY(0)} }
    .accent-line {
      width: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-color), var(--glow-color), var(--accent-color), transparent);
      animation: lineExpand 1.2s cubic-bezier(0.16,1,0.3,1) 1.5s forwards; margin: 0.2rem 0 0.4rem;
    }
    @keyframes lineExpand { 0%{width:0;opacity:0} 100%{width:min(80%,500px);opacity:1} }

    /* ── Splash visual: animated planet (replaces video) ── */
    .splash-planet-wrap {
      position: relative; opacity: 0; transform: scale(0.8) translateY(30px);
      animation: imageReveal 1.2s cubic-bezier(0.16,1,0.3,1) 2s forwards;
      width: 320px; height: 320px;
    }
    @keyframes imageReveal { 0%{opacity:0;transform:scale(0.8) translateY(30px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
    .splash-planet-wrap svg { width: 100%; height: 100%; }

    .particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; opacity: 0; }

    /* ── GAMES SCREEN ── */
    #games-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; opacity: 0; transition: opacity 0.8s ease-in 3s; overflow-y: auto; z-index: 999;
    }
    #games-screen.visible { opacity: 1; }
    #games-screen > * { position: relative; z-index: 2; }
    header {
      position: relative; text-align: center; margin-bottom: 10px; width: 100%;
      background: var(--glass-bg); backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px 24px 14px;
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    header h1 {
      margin: 0; font-size: 42px; font-weight: 700; letter-spacing: 4px;
      background: linear-gradient(135deg,#00ffff,#4fc3ff,#ffd700,#00ffff); background-size: 300% 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmerText 8s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(79,195,255,0.4)) drop-shadow(0 0 30px rgba(255,215,0,0.2));
    }
    @keyframes shimmerText { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    #nav-tabs { margin-top: 14px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; width: 100%; }
    .nav-tab {
      padding: 10px 22px; border: 1px solid var(--glass-border); background: rgba(1,2,8,0.9);
      backdrop-filter: blur(12px); color: #8ab0d8; font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; border-radius: 50px; transition: all 0.3s ease; letter-spacing: 1px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .nav-tab:hover { border-color: rgba(79,195,255,0.6); background: rgba(15,25,55,0.5); color: #00ffff; }
    .nav-tab.active {
      border-color: rgba(79,195,255,0.7); background: rgba(10,20,45,0.6);
      color: #00ffff; box-shadow: 0 0 30px rgba(79,195,255,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    #count {
      position: fixed; top: 14px; right: 14px; font-size: 12px; color: #7dd8ff;
      background: var(--glass-bg); backdrop-filter: blur(14px); border: 1px solid var(--glass-border);
      padding: 6px 14px; border-radius: 50px; z-index: 1001; box-shadow: var(--glass-shadow); letter-spacing: 1px;
    }
    #search {
      margin: 8px auto; max-width: 440px; width: 100%; padding: 14px 20px; border-radius: 50px;
      border: 1px solid var(--glass-border); background: rgba(5,15,40,0.4); backdrop-filter: blur(16px);
      color: #e0f0ff; font-family: inherit; font-size: 14px; outline: none;
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.05); transition: all 0.3s ease; letter-spacing: 0.5px;
    }
    #search::placeholder { color: rgba(150,200,255,0.45); }
    #search:focus { border-color: rgba(79,195,255,0.5); background: rgba(5,20,55,0.55); }
    #games-wrapper { flex: 1; overflow-y: auto; width: 100%; }
    #games {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      justify-content: center; gap: 16px 8px; margin-top: 20px; padding: 0 10px 30px;
    }
    .game-wrap {
      display: flex; align-items: center; justify-content: center;
      width: 280px; height: 190px; position: relative;
      transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.35s ease;
      cursor: pointer;
    }
    .game-wrap:hover {
      transform: translateY(-10px) scale(1.07);
      filter: drop-shadow(0 0 22px rgba(0,212,255,0.65)) drop-shadow(0 0 50px rgba(123,47,255,0.4));
    }
    .planet-svg { width: 100%; height: 100%; overflow: visible; display: block; }
    .star-btn {
      position: absolute; top: 4px; right: 8px; width: 26px; height: 26px;
      border: 1px solid rgba(255,215,0,0.4); background: rgba(30,20,5,0.6);
      color: #ffd700; font-size: 13px; cursor: pointer; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      transition: all 0.3s ease; z-index: 5; padding: 0; opacity: 0; pointer-events: all;
    }
    .game-wrap:hover .star-btn { opacity: 1; }
    .star-btn.favorited { opacity: 1; background: rgba(255,200,0,0.25); border-color: rgba(255,215,0,0.7); box-shadow: 0 0 16px rgba(255,215,0,0.5); }
    footer {
      text-align: center; font-size: 12px; letter-spacing: 2px; color: rgba(140,200,255,0.6);
      padding: 14px 30px; margin-top: 10px; width: 100%; max-width: 500px;
      background: var(--glass-bg); backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border); border-radius: 50px; box-shadow: var(--glass-shadow);
    }
    #empty-state { text-align: center; margin-top: 60px; font-size: 18px; color: rgba(140,200,255,0.5); letter-spacing: 2px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,180,255,0.25); border-radius: 3px; }

    /* ── Splash planet animation ── */
    @keyframes rotatePlanet { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulseGlow {
      0%,100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .splash-ring-anim { animation: rotatePlanet 18s linear infinite; transform-origin: 50% 50%; }
    .splash-glow-anim { animation: pulseGlow 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="nebula-bg"></div>
  <div class="stars"></div>
  <div id="count">Loading…</div>

  <!-- SPLASH -->
  <div id="splash-screen">
    <div class="splash-wrapper">
      <div class="grid-bg"></div>
      <div id="mathSymbols"></div>
      <div id="particles"></div>
      <div style="text-align:center;position:relative;z-index:2;margin-bottom:-10px;margin-top:100px;">
        <div class="title-line"><h1 class="title-main">Math Helper</h1></div>
        <div class="title-line"><p class="title-sub">Infinite</p></div>
      </div>
      <div class="accent-line"></div>
      <!-- Animated SVG planet replaces external video -->
      <div class="splash-planet-wrap">
        <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="splashPlanetGrad" cx="38%" cy="32%" r="65%">
              <stop offset="0%"  stop-color="#1a6fff"/>
              <stop offset="40%" stop-color="#0a2a8a"/>
              <stop offset="100%" stop-color="#000820"/>
            </radialGradient>
            <radialGradient id="splashSpecGrad" cx="36%" cy="30%" r="62%">
              <stop offset="0%"  stop-color="rgba(255,255,255,0.22)"/>
              <stop offset="45%" stop-color="rgba(255,255,255,0.04)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
            </radialGradient>
            <radialGradient id="splashGlowGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%"  stop-color="rgba(0,180,255,0.25)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
            </radialGradient>
            <clipPath id="splashCp">
              <circle cx="160" cy="160" r="90"/>
            </clipPath>
            <clipPath id="splashBk">
              <rect x="0" y="160" width="320" height="162"/>
            </clipPath>
            <clipPath id="splashFr">
              <rect x="0" y="0" width="320" height="161"/>
            </clipPath>
          </defs>

          <!-- outer glow -->
          <circle cx="160" cy="160" r="130" fill="url(#splashGlowGrad)" class="splash-glow-anim"/>

          <!-- rings behind planet -->
          <g clip-path="url(#splashBk)" class="splash-ring-anim">
            <ellipse cx="160" cy="160" rx="128" ry="27" fill="none" stroke="rgba(70,110,200,0.28)" stroke-width="9"/>
            <ellipse cx="160" cy="160" rx="112" ry="23" fill="none" stroke="rgba(90,140,220,0.38)" stroke-width="13"/>
            <ellipse cx="160" cy="160" rx="98"  ry="20" fill="none" stroke="rgba(8,12,28,0.85)"    stroke-width="5"/>
            <ellipse cx="160" cy="160" rx="104" ry="22" fill="none" stroke="rgba(80,120,200,0.42)" stroke-width="12"/>
          </g>

          <!-- planet body -->
          <circle cx="160" cy="160" r="90" fill="url(#splashPlanetGrad)"/>

          <!-- surface detail bands -->
          <g clip-path="url(#splashCp)">
            <ellipse cx="160" cy="138" rx="90" ry="14" fill="rgba(20,60,160,0.35)"/>
            <ellipse cx="160" cy="155" rx="90" ry="10" fill="rgba(30,80,200,0.25)"/>
            <ellipse cx="160" cy="172" rx="90" ry="12" fill="rgba(10,40,120,0.30)"/>
            <ellipse cx="160" cy="190" rx="90" ry="9"  fill="rgba(20,60,160,0.20)"/>
            <!-- math symbols on planet -->
            <text x="130" y="150" font-size="22" fill="rgba(100,200,255,0.55)" font-family="monospace" font-weight="bold">∑</text>
            <text x="155" y="175" font-size="18" fill="rgba(150,220,255,0.45)" font-family="monospace" font-weight="bold">π</text>
            <text x="175" y="148" font-size="16" fill="rgba(80,180,255,0.40)" font-family="monospace">√</text>
          </g>

          <!-- specular highlight -->
          <circle cx="160" cy="160" r="90" fill="url(#splashSpecGrad)" clip-path="url(#splashCp)"/>

          <!-- rim light -->
          <circle cx="160" cy="160" r="90" fill="none" stroke="rgba(140,200,255,0.22)" stroke-width="1.5"/>

          <!-- rings in front of planet -->
          <g clip-path="url(#splashFr)" class="splash-ring-anim">
            <ellipse cx="160" cy="160" rx="128" ry="27" fill="none" stroke="rgba(70,110,200,0.28)" stroke-width="9"/>
            <ellipse cx="160" cy="160" rx="112" ry="23" fill="none" stroke="rgba(90,140,220,0.38)" stroke-width="13"/>
            <ellipse cx="160" cy="160" rx="98"  ry="20" fill="none" stroke="rgba(8,12,28,0.85)"    stroke-width="5"/>
            <ellipse cx="160" cy="160" rx="104" ry="22" fill="none" stroke="rgba(80,120,200,0.42)" stroke-width="12"/>
          </g>
        </svg>
      </div>
    </div>
  </div>

  <!-- GAMES SCREEN -->
  <div id="games-screen">
    <header>
      <h1>🎮 Math Helper Games 🎮</h1>
      <div id="nav-tabs">
        <button id="tab-all" class="nav-tab active" onclick="switchTab('all')">All Games</button>
        <button id="tab-favorites" class="nav-tab" onclick="switchTab('favorites')">⭐ Favorites</button>
      </div>
    </header>
    <input id="search" placeholder="Search the galaxy..." oninput="filterGames()">
    <div id="games-wrapper">
      <div id="games"></div>
      <div id="empty-state" style="display:none;">No games found</div>
    </div>
    <footer>Forged in orbit by the Math Helper Team</footer>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    const OWNER = 'beastcooper', REPO = 'MHI_games', BRANCH = 'master', BASE = 'offline';

    // Use jsDelivr as the primary URL — it has permissive CORS headers and
    // works cross-origin from any page including about:blank.
    const JSDELIVR_BASE = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/${BASE}/`;

    // GitHub API (for directory listing) also works cross-origin.
    // Raw GitHub URLs sometimes block non-browser origins; jsDelivr is safer.
    const GH_API = p =>
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${p ? BASE+'/'+p : BASE}?ref=${BRANCH}`;

    // ── Fetch helper ─────────────────────────────────────────────────────────
    // Tries jsDelivr first (great CORS), falls back to raw GitHub.
    async function safeFetch(url, fallback) {
      const urls = [url, fallback].filter(Boolean);
      for (const u of urls) {
        try {
          const r = await fetch(u, { signal: AbortSignal.timeout(15000) });
          if (r.ok) return r;
        } catch (e) { console.warn('fetch failed:', u, e.message); }
      }
      throw new Error('All fetch attempts failed');
    }

    // ── State ────────────────────────────────────────────────────────────────
    let allGames = [], favorites = [], currentTab = 'all';

    function loadFavorites() { favorites = JSON.parse(localStorage.getItem('gamesFavorites') || '[]'); }
    function saveFavorites() { localStorage.setItem('gamesFavorites', JSON.stringify(favorites)); }
    function isFav(key) { return favorites.includes(key); }
    function toggleFav(key, e) {
      e.stopPropagation();
      favorites = isFav(key) ? favorites.filter(f => f !== key) : [...favorites, key];
      saveFavorites(); renderGames();
    }
    function switchTab(tab) {
      currentTab = tab; localStorage.setItem('gamesCurrentTab', tab);
      document.getElementById('tab-all').classList.toggle('active', tab === 'all');
      document.getElementById('tab-favorites').classList.toggle('active', tab === 'favorites');
      document.getElementById('search').style.display = tab === 'all' ? 'block' : 'none';
      renderGames();
    }

    // ── Load game list ───────────────────────────────────────────────────────
    async function loadGames() {
      try {
        const r = await safeFetch(GH_API());
        const items = await r.json();
        if (!Array.isArray(items)) throw new Error('Unexpected API response');

        for (const item of items) {
          if (item.type === 'file' && /\.(html|htm)$/i.test(item.name)) {
            const key = item.name.replace(/\.(html|htm)$/i, '');
            addGame(key, JSDELIVR_BASE + item.name, item.download_url);
          }
          if (item.type === 'dir') {
            try {
              const sub = await safeFetch(GH_API(item.name)).then(r => r.json());
              const idx = sub.find(f => /^index\.(html|htm)$/i.test(f.name));
              if (idx) addGame(item.name, JSDELIVR_BASE + item.name + '/index.html', idx.download_url);
            } catch (e) { console.warn('Skipping dir', item.name, e.message); }
          }
        }
        allGames.sort((a, b) => a.key.localeCompare(b.key));
        document.getElementById('count').textContent = allGames.length + ' games';
        renderGames();
      } catch (e) {
        console.error('Failed to load games:', e);
        document.getElementById('count').textContent = 'Load failed';
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('empty-state').textContent = '⚠️ Could not reach GitHub. Check your connection.';
      }
    }

    function addGame(key, url, fallbackUrl) {
      if (allGames.some(g => g.key === key)) return;
      // Thumbnail: try jsDelivr for the PNG too
      const imgUrl = JSDELIVR_BASE + key + '.png';
      allGames.push({ key, url, fallbackUrl, imgUrl });
    }

    // ── Launch a game ────────────────────────────────────────────────────────
    async function launchGame(game) {
      try {
        const r = await safeFetch(game.url, game.fallbackUrl);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const html = await r.text();
        const win = window.open('', '_blank');
        if (!win) throw new Error('Popup blocked. Please disable popup blocker.');
        win.document.open();
        win.document.write(html);
        win.document.close();
        win.document.title = game.key.replace(/[-_]/g, ' ').toUpperCase();
      } catch (err) { alert('⚠️ Could not load game\n\n' + err.message); }
    }

    // ── Planet SVG renderer ──────────────────────────────────────────────────
    const RY_SCALE = 0.21, PLANET_R = 68;
    const RING_BANDS = [
      { ri: PLANET_R+3,  ro: PLANET_R+11, col: 'rgba(70,90,140,0.25)',  hov: 'rgba(100,130,180,0.35)' },
      { ri: PLANET_R+12, ro: PLANET_R+24, col: 'rgba(80,110,160,0.35)', hov: 'rgba(110,150,200,0.50)' },
      { ri: PLANET_R+24, ro: PLANET_R+29, col: 'rgba(60,80,120,0.30)',  hov: 'rgba(90,120,160,0.45)'  },
      { ri: PLANET_R+29, ro: PLANET_R+34, col: 'rgba(8,12,28,0.80)',    hov: 'rgba(8,12,28,0.80)'     },
      { ri: PLANET_R+34, ro: PLANET_R+46, col: 'rgba(75,105,155,0.40)', hov: 'rgba(110,150,200,0.60)' },
      { ri: PLANET_R+46, ro: PLANET_R+50, col: 'rgba(50,70,110,0.18)',  hov: 'rgba(80,110,160,0.28)'  },
    ];
    RING_BANDS.forEach(b => { b.riY = b.ri * RY_SCALE; b.roY = b.ro * RY_SCALE; });
    const TEXT_BAND = RING_BANDS[4];
    const TEXT_RX = (TEXT_BAND.ri + TEXT_BAND.ro) / 2;
    const TEXT_RY = TEXT_RX * RY_SCALE;

    function annulusPath(cx, cy, ri, riY, ro, roY) {
      return [
        `M ${cx+ro} ${cy}`,
        `A ${ro} ${roY} 0 1 0 ${cx-ro} ${cy}`,
        `A ${ro} ${roY} 0 1 0 ${cx+ro} ${cy}`,
        `M ${cx+ri} ${cy}`,
        `A ${ri} ${riY} 0 1 1 ${cx-ri} ${cy}`,
        `A ${ri} ${riY} 0 1 1 ${cx+ri} ${cy}`,
        'Z'
      ].join(' ');
    }

    function makePlanetSVG(key, imgUrl) {
      const ns = 'http://www.w3.org/2000/svg';
      const id = 'p' + Math.random().toString(36).slice(2, 9);
      const W = 280, H = 190, cx = W/2, cy = H/2;

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('width', W); svg.setAttribute('height', H);
      svg.classList.add('planet-svg'); svg.style.cursor = 'pointer';

      const defs = document.createElementNS(ns, 'defs');

      const cp = document.createElementNS(ns, 'clipPath');
      cp.setAttribute('id', id+'_cp');
      const cpc = document.createElementNS(ns, 'circle');
      cpc.setAttribute('cx', cx); cpc.setAttribute('cy', cy); cpc.setAttribute('r', PLANET_R);
      cp.appendChild(cpc); defs.appendChild(cp);

      const bkClip = document.createElementNS(ns, 'clipPath');
      bkClip.setAttribute('id', id+'_bk');
      const bkR = document.createElementNS(ns, 'rect');
      bkR.setAttribute('x', 0); bkR.setAttribute('y', cy);
      bkR.setAttribute('width', W); bkR.setAttribute('height', cy+2);
      bkClip.appendChild(bkR); defs.appendChild(bkClip);

      const frClip = document.createElementNS(ns, 'clipPath');
      frClip.setAttribute('id', id+'_fr');
      const frR = document.createElementNS(ns, 'rect');
      frR.setAttribute('x', 0); frR.setAttribute('y', 0);
      frR.setAttribute('width', W); frR.setAttribute('height', cy+1);
      frClip.appendChild(frR); defs.appendChild(frClip);

      const specGrad = document.createElementNS(ns, 'radialGradient');
      specGrad.setAttribute('id', id+'_sp');
      specGrad.setAttribute('cx', '36%'); specGrad.setAttribute('cy', '32%'); specGrad.setAttribute('r', '62%');
      [['0%','rgba(255,255,255,0.20)'],['45%','rgba(255,255,255,0.03)'],['100%','rgba(0,0,0,0.50)']].forEach(([o,c]) => {
        const s = document.createElementNS(ns, 'stop');
        s.setAttribute('offset', o); s.setAttribute('stop-color', c); specGrad.appendChild(s);
      });
      defs.appendChild(specGrad);

      const k = 0.5523;
      const arcD =
        `M ${cx-TEXT_RX},${cy} ` +
        `C ${cx-TEXT_RX},${cy-TEXT_RY*k} ${cx-TEXT_RX*k},${cy-TEXT_RY} ${cx},${cy-TEXT_RY} ` +
        `C ${cx+TEXT_RX*k},${cy-TEXT_RY} ${cx+TEXT_RX},${cy-TEXT_RY*k} ${cx+TEXT_RX},${cy}`;
      const arcPath = document.createElementNS(ns, 'path');
      arcPath.setAttribute('id', id+'_arc'); arcPath.setAttribute('d', arcD); arcPath.setAttribute('fill', 'none');
      defs.appendChild(arcPath);
      svg.appendChild(defs);

      // rings behind
      const backG = document.createElementNS(ns, 'g');
      backG.setAttribute('clip-path', `url(#${id}_bk)`);
      backG.classList.add('rings-back');
      RING_BANDS.forEach((b, i) => {
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', annulusPath(cx, cy, b.ri, b.riY, b.ro, b.roY));
        path.setAttribute('fill', b.col); path.setAttribute('fill-rule', 'evenodd');
        path.setAttribute('opacity', '0.45'); path.dataset.bi = i;
        backG.appendChild(path);
      });
      svg.appendChild(backG);

      // planet base
      const base = document.createElementNS(ns, 'circle');
      base.setAttribute('cx', cx); base.setAttribute('cy', cy); base.setAttribute('r', PLANET_R);
      base.setAttribute('fill', '#00008B'); svg.appendChild(base);

      // thumbnail image (graceful fallback to blue circle)
      const img = document.createElementNS(ns, 'image');
      img.setAttribute('href', imgUrl);
      img.setAttribute('x', cx-PLANET_R); img.setAttribute('y', cy-PLANET_R);
      img.setAttribute('width', PLANET_R*2); img.setAttribute('height', PLANET_R*2);
      img.setAttribute('clip-path', `url(#${id}_cp)`);
      img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      img.addEventListener('error', () => { img.style.display = 'none'; });
      svg.appendChild(img);

      // specular
      const spec = document.createElementNS(ns, 'circle');
      spec.setAttribute('cx', cx); spec.setAttribute('cy', cy); spec.setAttribute('r', PLANET_R);
      spec.setAttribute('fill', `url(#${id}_sp)`); spec.setAttribute('clip-path', `url(#${id}_cp)`);
      svg.appendChild(spec);

      // rim
      const rim = document.createElementNS(ns, 'circle');
      rim.setAttribute('cx', cx); rim.setAttribute('cy', cy); rim.setAttribute('r', PLANET_R);
      rim.setAttribute('fill', 'none'); rim.setAttribute('stroke', 'rgba(140,200,255,0.20)');
      rim.setAttribute('stroke-width', '1'); svg.appendChild(rim);

      // rings in front
      const frontG = document.createElementNS(ns, 'g');
      frontG.setAttribute('clip-path', `url(#${id}_fr)`);
      frontG.classList.add('rings-front');
      RING_BANDS.forEach((b, i) => {
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', annulusPath(cx, cy, b.ri, b.riY, b.ro, b.roY));
        path.setAttribute('fill', b.col); path.setAttribute('fill-rule', 'evenodd');
        path.dataset.bi = i; frontG.appendChild(path);
      });
      svg.appendChild(frontG);

      // ring label
      const label = key.replace(/[-_]/g, ' ').toUpperCase();
      const textEl = document.createElementNS(ns, 'text');
      textEl.setAttribute('font-family', "'Courier New', monospace");
      textEl.setAttribute('font-size', '10');
      textEl.setAttribute('font-weight', '700');
      textEl.setAttribute('letter-spacing', '2');
      textEl.setAttribute('clip-path', `url(#${id}_fr)`);
      textEl.classList.add('ring-label');
      const tp = document.createElementNS(ns, 'textPath');
      tp.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#'+id+'_arc');
      tp.setAttribute('href', '#'+id+'_arc');
      tp.setAttribute('startOffset', '50%');
      tp.setAttribute('text-anchor', 'middle');
      tp.setAttribute('fill', 'rgba(200,235,255,0.85)');
      tp.classList.add('ring-label-tp');
      tp.textContent = label;
      textEl.appendChild(tp); svg.appendChild(textEl);
      svg.dataset.id = id;
      return svg;
    }

    // ── Render grid ──────────────────────────────────────────────────────────
    function renderGames() {
      const q = document.getElementById('search').value.toLowerCase();
      let list = allGames;
      if (currentTab === 'favorites') list = allGames.filter(g => isFav(g.key));
      else if (q) list = allGames.filter(g => g.key.replace(/[-_]/g,' ').toLowerCase().includes(q));

      const grid = document.getElementById('games');
      const empty = document.getElementById('empty-state');
      grid.innerHTML = '';
      if (!list.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      for (const game of list) {
        const wrap = document.createElement('div');
        wrap.className = 'game-wrap';

        const svgEl = makePlanetSVG(game.key, game.imgUrl);
        svgEl.addEventListener('click', () => launchGame(game));
        wrap.appendChild(svgEl);

        wrap.addEventListener('mouseenter', () => {
          svgEl.querySelectorAll('.rings-front path').forEach((p, i) => {
            if (i < RING_BANDS.length) p.setAttribute('fill', RING_BANDS[i].hov);
          });
          svgEl.querySelectorAll('.ring-label-tp').forEach(tp => tp.setAttribute('fill', 'rgba(5,10,30,1)'));
        });
        wrap.addEventListener('mouseleave', () => {
          svgEl.querySelectorAll('.rings-front path').forEach((p, i) => {
            if (i < RING_BANDS.length) p.setAttribute('fill', RING_BANDS[i].col);
          });
          svgEl.querySelectorAll('.ring-label-tp').forEach(tp => tp.setAttribute('fill', 'rgba(200,235,255,0.85)'));
        });

        const star = document.createElement('button');
        star.className = 'star-btn' + (isFav(game.key) ? ' favorited' : '');
        star.textContent = isFav(game.key) ? '★' : '☆';
        star.onclick = e => toggleFav(game.key, e);
        wrap.appendChild(star);

        grid.appendChild(wrap);
      }
    }

    function filterGames() { renderGames(); }

    // ── Splash animation ─────────────────────────────────────────────────────
    function initSplash() {
      const symbols = ['∑','∫','π','∞','√','Δ','∂','λ','θ','Ω','±','≈','≠','∝','∈'];
      const sc = document.getElementById('mathSymbols');
      for (let i = 0; i < 15; i++) {
        const s = document.createElement('span');
        s.className = 'math-symbol';
        s.textContent = symbols[i % symbols.length];
        s.style.cssText = `left:${5+Math.random()*90}%;top:${60+Math.random()*40}%;animation-delay:${Math.random()*8}s;animation-duration:${6+Math.random()*6}s;font-size:${1+Math.random()*1.5}rem`;
        sc.appendChild(s);
      }
      const pc = document.getElementById('particles');
      ['#00d4ff','#7b2fff','#e0e8ff','#00ffaa'].forEach((col, ci) => {
        for (let i = ci; i < 30; i += 4) {
          const p = document.createElement('div'); p.className = 'particle';
          p.style.background = col; p.style.left = '50%'; p.style.top = '40%';
          const angle = (Math.PI*2*i)/30, dist = 80+Math.random()*200;
          const tx = Math.cos(angle)*dist, ty = Math.sin(angle)*dist, dur = 1+Math.random()*0.5;
          p.animate([
            { opacity:0, transform:'translate(-50%,-50%) scale(0)' },
            { opacity:1, transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(1)`, offset:0.3 },
            { opacity:0, transform:`translate(calc(-50% + ${tx*1.5}px),calc(-50% + ${ty*1.5}px)) scale(0)` }
          ], { duration:dur*1000, delay:800, easing:'cubic-bezier(0.16,1,0.3,1)', fill:'forwards' });
          pc.appendChild(p);
        }
      });
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('games-screen').classList.add('visible');
      }, 3000);
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    async function init() {
      loadFavorites();
      initSplash();
      await loadGames();
      document.getElementById('search').value = localStorage.getItem('gamesSearchQuery') || '';
      if (localStorage.getItem('gamesCurrentTab') === 'favorites')
        setTimeout(() => switchTab('favorites'), 3100);
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
